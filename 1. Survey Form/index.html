<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Conference Survey</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <h1 id="title">Tech Conference Survey</h1>
            <p id="description">Thank you for taking the time to help us improve our future events.</p>
        </header>

        <form id="survey-form">
            <div class="form-group">
                <label id="name-label" for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required />
            </div>

            <div class="form-group">
                <label id="email-label" for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required />
            </div>

            <div class="form-group">
                <label id="number-label" for="number">Age (optional)</label>
                <input type="number" id="number" name="age" min="13" max="120" placeholder="Age" />
            </div>

            <div class="form-group">
                <label for="dropdown">Which role best describes you?</label>
                <select id="dropdown" name="role" required>
                    <option disabled selected value>Select current role</option>
                    <option value="student">Student</option>
                    <option value="professional">Professional</option>
                    <option value="hobbyist">Hobbyist</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <p>Would you recommend this conference to a friend?</p>
                <label>
                    <input type="radio" name="recommend" value="definitely" class="input-radio" checked />
                    Definitely
                </label>
                <label>
                    <input type="radio" name="recommend" value="maybe" class="input-radio" />
                    Maybe
                </label>
                <label>
                    <input type="radio" name="recommend" value="not-sure" class="input-radio" />
                    Not sure
                </label>
            </div>

            <div class="form-group">
                <p>What would you like to see improved? (Check all that apply)</p>
                <label>
                    <input type="checkbox" name="prefer" value="front-end" class="input-checkbox" />
                    Front-end Projects
                </label>
                <label>
                    <input type="checkbox" name="prefer" value="back-end" class="input-checkbox" />
                    Back-end Projects
                </label>
                <label>
                    <input type="checkbox" name="prefer" value="data-visualization" class="input-checkbox" />
                    Data Visualization
                </label>
                <label>
                    <input type="checkbox" name="prefer" value="open-source" class="input-checkbox" />
                    Open Source Community
                </label>
            </div>

            <div class="form-group">
                <p>Any comments or suggestions?</p>
                <textarea id="comments" name="comments" placeholder="Enter your comment here..." rows="5"></textarea>
            </div>

            <div class="form-group">
                <button type="submit" id="submit" class="submit-button">
                    Submit
                </button>
            </div>
        </form>
    </div>
</body>

</html>
